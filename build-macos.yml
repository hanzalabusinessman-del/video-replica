name: Build macOS installers

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    env:
      VIDEO_REPLICA_SKIP_PYTHON: "1"
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bundle macOS yt-dlp
        run: |
          curl --fail --location --retry 3 \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            --output node_modules/youtube-dl-exec/bin/yt-dlp
          chmod +x node_modules/youtube-dl-exec/bin/yt-dlp

      - name: Build installer
        run: |
          npm run build
          npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Video-Replica-macOS-${{ matrix.arch }}
          path: |
            dist/Video-Replica-*-${{ matrix.arch }}.dmg
            dist/Video-Replica-*-${{ matrix.arch }}.zip
          if-no-files-found: error
          retention-days: 14
